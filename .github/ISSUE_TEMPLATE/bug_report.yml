name: Bug report
description: Something in feature-loop isn't working
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: The command you ran and what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: base
    attributes:
      label: Base image
      description: The FL_IMAGE / --image / FL_DOCKERFILE you used.
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Docker version, bash version, `feature-loop --version`.
      render: text
