name: devcontainer

# The gate-toolchain base image (.devcontainer/Dockerfile) is never built by the
# pre-commit + bats gates, nor by /auto-feature (which runs inside an already-built
# base). So a Dockerfile that fails to build — e.g. #18 dropping xz-utils, which #29
# fixed — can merge green and only break later from a clean state. This workflow
# builds the image and smoke-tests the toolchain. Path-filtered so typical PRs that
# don't touch .devcontainer/ don't pay the ~1-2 min build.

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer.yml"
  pull_request:
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: devcontainer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - run: docker build -f .devcontainer/Dockerfile -t devcontainer-smoke .devcontainer
      # Smoke-test the toolchain: every tool the gate chain needs must be on PATH
      # and exit 0 in the built image. Catches build-ordering / missing-dep
      # regressions (like the xz-utils drop) that a successful build alone misses.
      - run: |
          docker run --rm devcontainer-smoke sh -euc '
            node --version
            go version
            pre-commit --version
            bats --version
            jq --version
            xz --version
          '
