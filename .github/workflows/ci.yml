name: ci

on:
  push:
    branches: [main]
  pull_request:
    # Skip lint + test on PRs that only touch docs/markdown — contributors are
    # expected to run `make lint` (pre-commit) locally for those changes.
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: stable
      - uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - run: python -m pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - run: sudo apt-get update && sudo apt-get install -y bats
      - run: bats --print-output-on-failure tests/

  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
      - run: npm install -g @anthropic-ai/claude-code
      # --strict treats warnings as errors so an unknown field or missing
      # required field on the plugin or marketplace manifest fails the build.
      - run: claude plugin validate --strict .claude-plugin/marketplace.json
      - run: claude plugin validate --strict .claude-plugin/plugin.json
      # Catch the defects --strict misses: non-semver versions and unresolved
      # marketplace source paths. See scripts/lint-plugin-manifests.sh.
      - run: scripts/lint-plugin-manifests.sh
